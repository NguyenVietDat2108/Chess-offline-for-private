<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess.js + Chessboard.js Full Demo</title>
    <link rel="stylesheet" href="css/chessboard-1.0.0.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a1a; color: #ddd; display: flex; gap: 20px; padding: 20px; justify-content: center; }
        .column { display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #2a2a2a; padding: 15px; border-radius: 8px; width: 300px; }
        h3 { margin: 0 0 10px 0; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        button {
            padding: 8px 12px; cursor: pointer; background: #444; color: white; 
            border: 1px solid #555; border-radius: 4px; margin: 2px; font-size: 13px;
        }
        button:hover { background: #555; }
        button:active { background: #333; }
        
        .status-box { font-family: monospace; background: #111; padding: 8px; border: 1px solid #444; color: #0f0; font-size: 11px; min-height: 20px; word-break: break-all; }
        .log-box { height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; background: #111; color: #aaa; padding: 5px; border: 1px solid #444; }
        .row { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>

    <div class="column">
        <div id="myBoard" style="width: 500px"></div>
        <div class="status-box" id="status">Status: Init...</div>
    </div>

    <div class="column">
        
        <div class="panel">
            <h3>Board UI (Chessboard.js)</h3>
            <div class="row">
                <button onclick="board.start()">Start Position</button>
                <button onclick="board.clear()">Clear Board</button>
                <button onclick="board.flip()">Flip Orientation</button>
            </div>
            <div class="row" style="margin-top:5px;">
                <button onclick="board.move('e2-e4')">Anim: e2-e4</button>
                <button onclick="board.move('d7-d5')">Anim: d7-d5</button>
            </div>
            <div class="row" style="margin-top:5px;">
                <button onclick="resizeBoard(400)">Size: 400px</button>
                <button onclick="resizeBoard(500)">Size: 500px</button>
            </div>
        </div>

        <div class="panel">
            <h3>Game Logic (Chess.js)</h3>
            <div class="row">
                <button onclick="game.reset(); board.position(game.fen()); updateStatus();">New Game</button>
                <button onclick="undoMove()">Undo Move</button>
                <button onclick="makeRandomMove()">Random Bot Move</button>
            </div>
            <div style="margin-top: 10px;">
                <small>FEN (Current State):</small>
                <div id="fenDisplay" class="status-box" style="color: #fdcb6e;"></div>
            </div>
            <div style="margin-top: 10px;">
                <small>PGN (History):</small>
                <div id="pgnDisplay" class="status-box" style="color: #74b9ff; height: 60px; overflow-y:scroll;"></div>
            </div>
        </div>

        <div class="panel">
            <h3>Event Log</h3>
            <div id="eventLog" class="log-box"></div>
            <button onclick="document.getElementById('eventLog').innerHTML = ''" style="width:100%; margin-top:5px;">Clear Log</button>
        </div>

    </div>

    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/chess.js"></script>
    <script src="js/chessboard-1.0.0.min.js"></script>

    <script>
        // --- 1. SVG PIECE GENERATOR (Bypasses Antivirus Blocking) ---
        function getPieceSvg(piece) {
            const color = piece.charAt(0); 
            const type = piece.charAt(1).toLowerCase();
            const stroke = color === 'w' ? '#000' : '#fff';
            const fill = color === 'w' ? '#fff' : '#000';
            const paths = {
                'p': `<path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" stroke="${stroke}" stroke-width="1.5" fill="${fill}" />`,
                'n': `<g fill="none" fill-rule="evenodd" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M 22,10 C 32.5,11 38.5,18 38,39 L 15,39 C 15,30 25,32.5 23,18" style="fill:${fill}; stroke:${stroke};" /><path d="M 24,18 C 24.38,20.91 18.45,25.37 16,27 C 13,29 13.18,31.34 11,31 C 9.958,30.06 12.41,27.96 11,28 C 10,28 11.19,29.23 10,30 C 9,30 5.997,31 6,26 C 6,24 12,14 12,14 C 12,14 13.89,12.1 14,10.5 C 13.27,9.506 13.5,8.5 13.5,7.5 C 14.5,6.5 16.5,10 16.5,10 L 18.5,10 C 18.5,10 19.28,8.008 21,7 C 22,7 22,10 22,10" style="fill:${fill}; stroke:${stroke};" /><path d="M 9.5 25.5 A 0.5 0.5 0 1 1 8.5,25.5 A 0.5 0.5 0 1 1 9.5 25.5 z" style="fill:${color==='w'?'#000':'#fff'}; stroke:${color==='w'?'#000':'#fff'};" /><path d="M 15 15.5 A 0.5 1.5 0 1 1 14,15.5 A 0.5 1.5 0 1 1 15 15.5 z" transform="matrix(0.866,0.5,-0.5,0.866,9.693,-5.173)" style="fill:${color==='w'?'#000':'#fff'}; stroke:${color==='w'?'#000':'#fff'};" /></g>`,
                'b': `<g fill="none" fill-rule="evenodd" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="${fill}" stroke-linecap="butt"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zM15 32c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z" /></g><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="${color==='w'?'#000':'#fff'}" stroke-linejoin="miter" /></g>`,
                'r': `<g fill="${fill}" fill-rule="evenodd" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 39h27v-3H9v3zM12 36v-4h21v4H12zM11 14V9h4v2h5V9h5v2h5V9h4v5" stroke-linecap="butt" /><path d="M34 14l-3 3H14l-3-3" /><path d="M31 17v12.5H14V17" stroke-linecap="butt" stroke-linejoin="miter" /><path d="M31 29.5l1.5 2.5h-20l1.5-2.5" /><path d="M11 14h23" fill="none" stroke="${stroke}" stroke-linejoin="miter" /></g>`,
                'q': `<g fill="${fill}" fill-rule="evenodd" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM24.5 7.5a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM41 12a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM16 8.5a2 2 0 1 1-4 0 2 2 0 1 1 4 0zM33 9a2 2 0 1 1-4 0 2 2 0 1 1 4 0z" /><path d="M9 26c8.5-1.5 21-1.5 27 0l2-12-7 11V11l-5.5 13.5-3-15-3 15-5.5-14V25L7 14l2 12zM9 26c0 2 1.5 2 2.5 4 1 1.5 1 1 .5 3.5-1.5 1-1.5 2.5-1.5 2.5-1.5 1.5.5 2.5.5 2.5 6.5 1 16.5 1 23 0 0 0 1.5-1 0-2.5 0 0 .5-1.5-1-2.5-.5-2.5-.5-2 .5-3.5 1-2 2.5-2 2.5-4-8.5-1.5-18.5-1.5-27 0z" stroke-linecap="butt" /><path d="M11.5 30c3.5-1 18.5-1 22 0M12 33.5c6-1 15-1 21 0" fill="none" /></g>`,
                'k': `<g fill="none" fill-rule="evenodd" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.5 11.63V6M20 8h5" stroke-linejoin="miter" /><path d="M22.5 25s4.5-7.5 3-10.5c0 0-1-2.5-3-2.5s-3 2.5-3 2.5c-1.5 3 3 10.5 3 10.5" fill="${fill}" stroke-linecap="butt" stroke-linejoin="miter" /><path d="M11.5 37c5.5 3.5 15.5 3.5 21 0v-7s9-4.5 6-10.5c-4-6.5-13.5-3.5-16 4V27v-3.5c-3.5-7.5-13-10.5-16-4-3 6 5 10 5 10V37z" fill="${fill}" /><path d="M11.5 30c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0m-21 3.5c5.5-3 15.5-3 21 0" stroke="${color==='w'?'#000':'#fff'}" /></g>`
            };
            return "data:image/svg+xml;base64," + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">${paths[type]}</svg>`);
        }

        // --- 2. LOGIC INITIALIZATION ---
        var board = null;
        var game = new Chess();
        
        function log(msg) {
            var $log = $('#eventLog');
            $log.append('<div>> ' + msg + '</div>');
            $log.scrollTop($log[0].scrollHeight);
        }

        // --- 3. EVENT HANDLERS ---
        
        function onDragStart (source, piece, position, orientation) {
            // Prevent picking up pieces if game is over
            if (game.game_over()) return false;

            // Prevent picking up opponent's pieces
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            log(`Drag Start: ${piece} from ${source}`);
        }

        function onDrop (source, target) {
            // Check legal move in Chess.js
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // NOTE: Simple logic, always promote to Queen
            });

            // Illegal move
            if (move === null) {
                log(`Invalid Move: ${source}->${target}`);
                return 'snapback';
            }

            log(`Move: ${move.san} (${source}->${target})`);
            updateStatus();
        }

        // Snap animation end (needed for complex moves like castling/promotion to update board UI)
        function onSnapEnd () {
            board.position(game.fen());
        }

        function onMoveEnd (oldPos, newPos) {
            // log("Animation finished");
        }

        function updateStatus () {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) {
                status = 'Game over, ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                status = 'Game over, drawn position';
            } else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ', ' + moveColor + ' is in check';
            }

            $('#status').html(status);
            $('#fenDisplay').text(game.fen());
            $('#pgnDisplay').text(game.pgn());
        }

        function makeRandomMove () {
            var possibleMoves = game.moves();
            // Game over
            if (possibleMoves.length === 0) return;

            var randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            board.position(game.fen());
            updateStatus();
            log("Bot played random move");
        }

        function undoMove() {
            var move = game.undo();
            if (move) {
                board.position(game.fen());
                updateStatus();
                log("Undo: " + move.san);
            }
        }

        function resizeBoard(px) {
            $('#myBoard').css('width', px);
            board.resize();
        }

        // --- 4. BOARD CONFIGURATION ---
        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            onMoveEnd: onMoveEnd,
            pieceTheme: getPieceSvg // Use our SVG generator
        }
        
        board = Chessboard('myBoard', config);
        updateStatus();
        log("Board initialized");

    </script>
</body>
</html>
